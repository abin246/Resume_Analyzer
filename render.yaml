services:
  - type: pserv
    name: resume-analyzer-localai
    runtime: docker
    rootDir: localai_render
    envVars:
      - key: CORS
        value: "*"
    disk:
      name: localai-models
      mountPath: /models
      sizeGB: 20

  - type: web
    name: resume-analyzer-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LOCALAI_BASE_URL
        value: http://resume-analyzer-localai:8080/v1
      - key: LOCALAI_MODEL
        value: tinyllama-chat
      - key: MAX_RESUME_FILE_SIZE_MB
        value: 5
      - key: ENABLE_FALLBACK_ANALYZER
        value: true
      - key: DATABASE_PATH
        value: /var/data/resume_analyzer.db
      - key: ALLOWED_ORIGINS
        sync: false
    disk:
      name: resume-analyzer-data
      mountPath: /var/data
      sizeGB: 1

  - type: static
    name: resume-analyzer-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
