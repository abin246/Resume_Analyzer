version: "3.9"

services:
  localai:
    image: localai/localai:latest
    container_name: localai
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - DEBUG=false
      - THREADS=6
      - CONTEXT_SIZE=4096
    volumes:
      - ./models:/models
    command: ["run", "--models-path", "/models", "--address", "0.0.0.0:8080"]
